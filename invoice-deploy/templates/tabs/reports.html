<div id="tab-reports" class="tab-content" style="display:none">
  <div style="font-size:18px;font-weight:600;margin-bottom:2px">📈 汇总报表</div>
  <div style="font-size:12px;color:#5f6368;margin-bottom:10px">多维度筛选查看点收/领用数据，支持导出 Excel</div>

  <div class="card" style="overflow:visible">
    <div class="card-body" style="padding:12px 16px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:600;color:#5f6368;white-space:nowrap">📅 年份</span>
        <div id="rptYears" style="min-width:130px"></div>
        <span style="font-size:12px;font-weight:600;color:#5f6368;white-space:nowrap">月份</span>
        <div id="rptMonths" style="min-width:130px"></div>
        <span style="font-size:12px;font-weight:600;color:#5f6368;white-space:nowrap">🏗️ 工程</span>
        <div id="rptProject" style="min-width:140px"></div>
        <span style="font-size:12px;font-weight:600;color:#5f6368;white-space:nowrap">🏭 仓库</span>
        <div id="rptWarehouse" style="min-width:110px"></div>
        <span style="font-size:12px;font-weight:600;color:#5f6368;white-space:nowrap">🏢 供应商</span>
        <div id="rptSupplier" style="min-width:140px"></div>
        <button class="btn btn-primary btn-sm" onclick="ReportModule.load()">🔍 查询</button>
      </div>
    </div>
  </div>

  <!-- 汇总概览 -->
  <div class="card">
    <div class="card-body" style="padding:12px 16px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center" id="rptSummary">
        <div><div style="font-size:12px;color:#5f6368;margin-bottom:4px">点收金额</div><div style="font-size:22px;font-weight:700;color:#1a73e8" id="sumRecvAmt">-</div></div>
        <div><div style="font-size:12px;color:#5f6368;margin-bottom:4px">领用金额</div><div style="font-size:22px;font-weight:700;color:#ea8600" id="sumUseAmt">-</div></div>
        <div><div style="font-size:12px;color:#5f6368;margin-bottom:4px">点收单数</div><div style="font-size:22px;font-weight:700;color:#34a853" id="sumRecvCnt">-</div></div>
        <div><div style="font-size:12px;color:#5f6368;margin-bottom:4px">领用单数</div><div style="font-size:22px;font-weight:700;color:#9334e6" id="sumUseCnt">-</div></div>
      </div>
    </div>
  </div>

  <!-- 明细表格 -->
  <div class="card">
    <div class="card-body" style="padding:0">
      <div style="display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid #e0e0e0;background:#fafafa">
        <button class="btn btn-sm btn-primary" id="rptViewDetail" onclick="ReportModule.setView('detail')">📋 明细</button>
        <button class="btn btn-sm btn-outline" id="rptViewWarehouse" onclick="ReportModule.setView('warehouse')">🏭 按仓库</button>
        <button class="btn btn-sm btn-outline" id="rptViewProject" onclick="ReportModule.setView('project')">🏗️ 按工程</button>
        <button class="btn btn-sm btn-outline" id="rptViewSupplier" onclick="ReportModule.setView('supplier')">🏢 按供应商</button>
        <span style="flex:1"></span>
        <button class="btn btn-outline btn-sm" onclick="ReportModule.exportExcel()">📥 导出Excel</button>
        <button class="btn btn-outline btn-sm" onclick="ReportModule.printReport()">🖨️ 打印</button>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="rptTable">
          <thead><tr>
            <th style="text-align:center">月份</th>
            <th style="text-align:center">工程编号</th>
            <th>工程名称</th>
            <th>仓库</th>
            <th>供应商</th>
            <th style="text-align:center">点收单数</th>
            <th style="text-align:right">点收金额</th>
            <th style="text-align:center">领用单数</th>
            <th style="text-align:right">领用金额</th>
          </tr></thead>
          <tbody id="rptTableBody">
            <tr><td colspan="9" style="text-align:center;padding:40px;color:#9aa0a6">选择筛选条件后点击查询</td></tr>
          </tbody>
        </table>
      </div>
      <div id="rptPagination" style="padding:8px 16px"></div>
    </div>
  </div>
</div>
