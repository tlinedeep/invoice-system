version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: invoice-pg
    restart: always
    volumes:
      # PostgreSQL 数据持久化（防丢）
      - ./pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: invoice
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: Invoice@2026!
    # 不映射宿主机端口，Flask 通过内部网络 postgres:5432 访问，与宿主机 PG 无冲突
    # expose:
    #   - "5432"

  invoice:
    build: .
    container_name: flask-invoice
    restart: always
    ports:
      - "127.0.0.1:5001:5000"
    depends_on:
      - postgres
    volumes:
      # 上传的发票和导出的 Excel 持久化
      - ./uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # 切换为 PostgreSQL 连接串
      - DATABASE_URL=postgresql://invoice:Invoice%402026!@postgres:5432/invoice
