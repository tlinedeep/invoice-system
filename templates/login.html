<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 物资点收领用平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #f0f2f5; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  padding: 40px; width: 380px; max-width: 90vw;
}
.login-box h1 { font-size: 20px; text-align: center; color: #1a73e8; margin-bottom: 6px; }
.login-box .sub { font-size: 12px; text-align: center; color: #5f6368; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: #5f6368; margin-bottom: 4px; font-weight: 500; }
.form-group input {
  width: 100%; padding: 10px 12px; border: 1px solid #dadce0; border-radius: 6px;
  font-size: 14px; outline: none; transition: border-color 0.15s;
}
.form-group input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.12); }
.btn {
  width: 100%; padding: 10px; background: #1a73e8; color: white;
  border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn:hover { background: #1557b0; }
.btn:disabled { background: #93b8f0; cursor: not-allowed; }
.error { color: #ea4335; font-size: 12px; margin-top: 8px; display: none; }
.logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
.version { text-align: center; font-size: 11px; color: #9aa0a6; margin-top: 16px; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">📦</div>
  <h1>物资点收领用平台</h1>
  <div class="sub">请登录以继续</div>
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" autofocus>
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="error" id="loginError"></div>
  <button class="btn" id="loginBtn" onclick="login()">登 录</button>
  <div class="version">v0.40</div>
</div>
<script>
async function login() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  btn.disabled = true;
  err.style.display = 'none';
  try {
    const resp = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    if (!resp.ok) {
      const d = await resp.json();
      throw new Error(d.error || '登录失败');
    }
    window.location.href = '/';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
