<div id="tab-invoices" class="tab-content" style="display:none">
  <div style="font-size:20px;font-weight:600;margin-bottom:2px">📄 发票列表</div>
  <div style="font-size:13px;color:#5f6368;margin-bottom:14px">已导入的历史发票记录</div>

  <div class="card" id="invoiceListHeader">
    <div class="card-body" style="padding:8px 12px">
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-control" style="max-width:250px" placeholder="搜索供应商/发票号..." id="invSearch">
        <button class="btn btn-outline btn-sm" onclick="InvoiceListModule.page=1;InvoiceListModule.loadList()">🔍 搜索</button>
        <span style="flex:1"></span>
        <span style="font-size:12px;color:#5f6368">共 <strong id="invCount">0</strong> 条记录</span>
      </div>
    </div>
  </div>

  <div id="invoiceList"></div>

  <div id="invoiceDetail" style="display:none">
    <div class="card">
      <div class="card-header" style="background:#f8f9fa;justify-content:center;font-size:15px;padding:14px">
        📄 发票详情
      </div>
      <div class="card-body" style="padding:12px 16px">
        <div class="form-row">
          <div class="form-group"><label>发票号码</label><input class="form-control" id="ivNo" readonly></div>
          <div class="form-group"><label>销售单位</label><input class="form-control" id="ivSeller" readonly></div>
          <div class="form-group"><label>开票日期</label><input class="form-control" id="ivDate" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>不含税金额</label><input class="form-control" id="ivAmount" readonly style="color:#1a73e8;font-weight:700"></div>
          <div class="form-group"><label>仓库</label><input class="form-control" id="ivWarehouse" readonly></div>
          <div class="form-group"><label>信用代码</label><input class="form-control" id="ivTaxNo" readonly style="font-size:12px"></div>
          <div class="form-group"><label>状态</label><input class="form-control" id="ivStatus" readonly></div>
        </div>
        <div id="ivFilePreview" style="margin-bottom:10px;max-width:320px;background:#f5f5f5;border-radius:4px;overflow:hidden;border:1px solid #e0e0e0;cursor:pointer" title="点击查看原件">
          <div style="display:flex;align-items:center;justify-content:center;min-height:100px;color:#ccc;font-size:12px">无原件</div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th style="width:40px">序号</th><th>材料名称</th><th>规格型号</th><th style="width:50px">单位</th><th style="width:80px">数量</th><th style="width:100px">单价</th><th style="width:100px">金额</th></tr></thead>
            <tbody id="ivItemsBody"></tbody>
          </table>
        </div>
      </div>
      <div class="btn-group" style="border-top:1px solid #e0e0e0">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('invoiceDetail').style.display='none';document.getElementById('invoiceList').style.display='block'">← 返回列表</button>
      </div>
    </div>
  </div>
</div>
