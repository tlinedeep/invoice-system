<div id="tab-receiving" class="tab-content" style="display:none">
  <div style="font-size:20px;font-weight:600;margin-bottom:2px">📋 点收单</div>
  <div style="font-size:13px;color:#5f6368;margin-bottom:14px">管理材料点收单，支持预览、编辑、导出、生成领用单</div>

  <div class="card">
    <div class="card-body" style="padding:8px 12px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="form-control" style="max-width:200px" placeholder="搜索编号/供应商..." id="recvSearch">
        <button class="btn btn-outline btn-sm" onclick="ReceivingModule.page=1;ReceivingModule.loadList()">🔍 搜索</button>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;margin-right:12px;margin-left:16px">
          <input type="checkbox" id="rdBatchMode" onchange="ReceivingModule.page=1;ReceivingModule.loadList()"> 批量模式
        </label>
        <label style="font-size:12px;display:none;align-items:center;gap:4px;cursor:pointer;margin-right:12px" id="rdSelectAllLabel">
          <input type="checkbox" id="rdSelectAll" onchange="ReceivingModule.toggleSelectAll()"> 全选
        </label>
        <button class="btn btn-outline btn-sm" id="rdFilterRemainBtn" onclick="ReceivingModule.toggleRemainingFilter()" style="font-size:12px;margin-right:8px">⏳ 未领完</button>
        <button class="btn btn-primary btn-sm" id="rdBatchExportBtn" style="display:none" onclick="ReceivingModule.batchExport()">📥 批量导出</button>
        <span style="flex:1"></span>
        <span style="font-size:12px;color:#5f6368">共 <strong id="recvCount">0</strong> 条</span>
      </div>
    </div>
  </div>

  <!-- 点收单详情 -->
  <div id="recvDetail" style="display:none">
    <div class="card">
      <div class="card-header" style="background:#f8f9fa;justify-content:center;font-size:15px;padding:14px">
        📄 天津港航安装工程有限公司《材料点收单》
        <span style="margin-left:auto;font-size:12px;font-weight:400;" id="recvStatus"></span>
      </div>
      <div class="card-body" style="padding:12px 16px;overflow:visible">
        <div class="form-row">
          <div class="form-group"><label>点收编号</label><input class="form-control form-control-lg" id="rdNoteNo" readonly></div>
          <div class="form-group"><label>仓库</label><input class="form-control" id="rdWarehouse" readonly></div>
          <div class="form-group"><label>点收日期</label><input class="form-control" id="rdDate" readonly></div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th style="width:40px">序号</th><th>材料名称</th><th>规格型号</th><th style="width:50px">单位</th><th style="width:80px">数量</th><th style="width:100px">单价</th><th style="width:100px">金额</th></tr></thead>
            <tbody id="rdItemsBody"></tbody>
          </table>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid #e0e0e0;font-size:14px" id="rdMeta"></div>
      </div>
      <div class="btn-group" style="border-top:1px solid #e0e0e0">
        <button class="btn btn-outline btn-sm" id="rdBtnDelete">🗑️ 删除</button>
        <button class="btn btn-outline btn-sm" id="rdBtnEdit">✏️ 编辑</button>
        <button class="btn btn-outline btn-sm" id="rdBtnPrint">🖨️ 打印</button>
        <button class="btn btn-outline btn-sm" id="rdBtnExport">📥 导出Excel</button>
        <button class="btn btn-success" id="rdBtnCreateUse">📝 生成领用单</button>
      </div>
    </div>
  </div>

  <div id="recvList"></div>
</div>
