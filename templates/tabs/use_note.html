<div id="tab-use" class="tab-content" style="display:none">
  <div style="font-size:20px;font-weight:600;margin-bottom:2px">📝 领用单</div>
  <div style="font-size:13px;color:#5f6368;margin-bottom:14px">材料领用登记</div>

  <div id="useDetail" style="display:none">
    <div class="card">
      <div class="card-header" style="background:#f8f9fa;justify-content:center;font-size:15px;padding:14px">
        📄 天津港航安装工程有限公司《材料领用单》
      </div>
      <div class="card-body" style="padding:12px 16px;overflow:visible">
        <div class="form-row">
          <div class="form-group"><label>领用编号</label><input class="form-control form-control-lg" id="udNoteNo" readonly></div>
          <div class="form-group"><label>仓库</label><input class="form-control" id="udWarehouse" readonly style="color:#80868b"></div>
          <div class="form-group"><label>日期</label><input class="form-control" id="udDate" readonly style="color:#80868b"></div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th style="width:40px">序号</th><th>材料名称</th><th>规格型号</th><th style="width:50px">单位</th><th style="width:80px">数量</th><th style="width:100px">单价</th><th style="width:100px">金额</th></tr></thead>
            <tbody id="udItemsBody"></tbody>
          </table>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid #e0e0e0;font-size:14px" id="udMeta"></div>
      </div>
      <div class="btn-group" style="border-top:1px solid #e0e0e0">
        <button class="btn btn-outline btn-sm" id="udBtnDelete">🗑️ 删除</button>
        <button class="btn btn-outline btn-sm" id="udBtnEdit">✏️ 编辑</button>
        <button class="btn btn-outline btn-sm" id="udBtnPrint">🖨️ 打印</button>
        <button class="btn btn-primary" id="udBtnExport">📥 导出Excel</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body" style="padding:8px 12px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="form-control" style="max-width:200px" placeholder="搜索编号/供应商..." id="useSearch">
        <button class="btn btn-outline btn-sm" onclick="UseModule.page=1;UseModule.loadList()">🔍 搜索</button>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;margin-right:12px;margin-left:16px">
          <input type="checkbox" id="udBatchMode" onchange="UseModule.page=1;UseModule.loadList()"> 批量模式
        </label>
        <label style="font-size:12px;display:none;align-items:center;gap:4px;cursor:pointer;margin-right:12px" id="udSelectAllLabel">
          <input type="checkbox" id="udSelectAll" onchange="UseModule.toggleSelectAll()"> 全选
        </label>
        <button class="btn btn-primary btn-sm" id="udBatchExportBtn" style="display:none" onclick="UseModule.batchExport()">📥 批量导出</button>
        <span style="flex:1"></span>
        <span style="font-size:12px;color:#5f6368">共 <strong id="useCount">0</strong> 条</span>
      </div>
    </div>
  </div>
  <div id="useList"></div>
</div>
